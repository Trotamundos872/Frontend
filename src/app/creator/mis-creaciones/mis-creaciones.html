<div class="topbar d-flex justify-content-between align-items-center">
  <div>
    <h2 class="mb-0">Mis Creaciones</h2>
    <small class="text-muted">Gestiona tus Add-Ons y Mapas</small>
  </div>
  <button class="btn btn-dark" routerLink="crear-addon">Nueva creación</button>
</div>

<div class="card card-dashboard p-4">
  <div *ngIf="loading" class="text-center p-3">
    <p>Cargando tus creaciones...</p>
  </div>

  <div *ngIf="!loading && valores.length === 0" class="text-muted mb-0">
    No tienes creaciones guardadas todavía.
  </div>

  <div *ngIf="!loading && valores.length > 0">
    <div class="d-flex text-body-secondary pt-3" *ngFor="let addon of valores">
      <img [src]="addon.urlMiniatura" class="list-img" alt="Thumbnail of {{ addon.nombre }}">
      <div class="pb-3 mb-0 small lh-sm border-bottom w-100">
        <div class="d-flex justify-content-between">
          <strong class="text-gray-dark">
            {{ addon.nombre }}
            <span class="badge bg-warning-subtle text-warning-emphasis rounded-pill ms-1 text-uppercase">{{ addon.tipo }}</span>
          </strong>
          <span>
            <a [routerLink]="['subir-archivo', addon.id]">Subir Archivo</a> | 
            <a href="#">Editar</a> | 
            <a [routerLink]="['/addon', addon.id]">Ver</a>
          </span>
        </div>
        <span class="d-block mt-1">{{ addon.descripcion | slice:0:60 }}{{ (addon.descripcion?.length ?? 0) > 60 ? '...' : '' }}</span>
      </div>
    </div>
  </div>
</div>
