<div class="topbar d-flex justify-content-between align-items-center">
  <div>
    <h2 class="mb-0">Mi Perfil de Creador</h2>
    <small class="text-muted">Modifica la Información Visible</small>
  </div>
  <button class="btn btn-dark" (click)="guardarCambios()" [disabled]="loading || saving">
    {{ saving ? 'Guardando...' : 'Guardar cambios' }}
  </button>
</div>

<div class="row g-4" *ngIf="info">
  <div class="col-12 col-md-6">
    <div class="card card-dashboard p-4">
      <h5 class="mb-3">Información Personal</h5>
      <div class="mb-3">
        <label class="form-label text-muted small">Nombre de Creador</label>
        <input type="text" class="form-control" [(ngModel)]="formData.nombre" maxlength="60">
      </div>
      <div>
        <label class="form-label text-muted small">Especialidad</label>
        <textarea class="form-control" rows="3" [(ngModel)]="formData.especialidad" maxlength="60"></textarea>
      </div>
    </div>
  </div>


</div>

<div class="alert alert-success mt-3" *ngIf="successMessage">
  {{ successMessage }}
</div>

<div class="alert alert-danger mt-3" *ngIf="errorMessage">
  {{ errorMessage }}
</div>

<div class="spinner-carga" *ngIf="loading">
  <div class="spinner-border text-primary" role="status">
  <span class="sr-only">Loading...</span>
</div>
</div>
