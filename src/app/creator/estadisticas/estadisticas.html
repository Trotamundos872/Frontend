<div class="mb-4">
  <h2 class="h4">Estadísticas de Descargas</h2>
  <p class="text-muted small">Resumen del rendimiento de tus proyectos publicados.</p>
</div>

<div class="card">
  <div class="card-body">
    <div *ngIf="loading" class="text-center py-5">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Cargando...</span>
      </div>
    </div>

    <div *ngIf="!loading && filas.length === 0" class="alert alert-light border text-center">
      No hay datos disponibles para mostrar.
    </div>

    <div class="table-responsive" *ngIf="!loading && filas.length > 0">
      <table class="table table-bordered table-hover mb-0">
        <thead>
          <tr>
            <th>Fecha</th>
            <th *ngFor="let name of addonNames" class="text-center">{{ name }}</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let fila of filas">
            <td>{{ fila.rawDate | date:'dd/MM/yyyy' }}</td>
            <td *ngFor="let name of addonNames" class="text-center">
              <span *ngIf="fila[name] !== undefined">
                {{ fila[name] }}
              </span>
              <span *ngIf="fila[name] === undefined" class="text-muted">-</span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
