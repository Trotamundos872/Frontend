<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-5">
            <div class="card mb-4 shadow-sm" id="registerCard">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">Contacto</h5>
                </div>
                <div class="card-body">
                    <form (ngSubmit)="enviarCorreo()">
                        <div class="mb-3">
                            <label for="usernameInput" class="form-label">Alias:</label>
                            <div class="input-group">
                                <span class="input-group-text" id="usernameAddon">
                                    <img src="user-solid-full.svg" width="16" height="16">
                                </span>
                                <input type="text" class="form-control" id="usernameInput" name="nombre"
                                     aria-describedby="usernameAddon usernameHelp" [(ngModel)]="formData.nombre">
                            </div>
                            <div class="form-text" id="usernameHelp">Tu Nickname que se mostrará a los demás usuarios.
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="emailInput" class="form-label">Correo Electrónico:</label>
                            <div class="input-group">
                                <span class="input-group-text" id="emailAddon">
                                    <img src="envelope-solid-full.svg" width="16" height="16">
                                </span>
                                <input type="email" class="form-control" id="emailInput" name="email"
                                     aria-describedby="emailAddon emailHelp" [(ngModel)]="formData.email">
                            </div>
                            <div id="emailHelp" class="form-text">Correo personal que usaremos para contactarte de forma
                                privada.</div>
                        </div>
<div class="mb-3">
  <label for="exampleFormControlTextarea1" class="form-label">Contenido</label>
  <textarea class="form-control" id="exampleFormControlTextarea1" rows="3" name="contenido" [(ngModel)]="formData.contenido"></textarea>
</div>

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary">
                               Enviar
                            </button>
                        </div>


                        <div class="alert alert-danger mt-3 d-flex align-items-center" role="alert" *ngIf="errorMessage">
                            <div>
                               {{ errorMessage }}
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
